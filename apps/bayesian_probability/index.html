<body>
    <div id="navbar" class="navbar fixed-top navbar-light bg-white justify-content-start p-2" style="background-color: ">

        <div class="offcanvas-header navbar navbar-light bg-white justify-content-start p-2">
            <button type="button" class="navbar-toggler" data-bs-dismiss="offcanvas" aria-label="Close">

            </button>
            <a class="navbar-toggler" href="../../index.html">dildeolupbiten</a>
        </div>
        <div id="offcanvas-body" class="offcanvas-body navbar-light bg-white"></div>

    <script src="../../static/js/index.js"></script>
    <script>
        const entries = [
            {"innerHTML": "Apps", "children": [
                {"href": "index.html", "innerHTML": "Bayesian Probability"},
                {"href": "../binomial_probability/index.html", "innerHTML": "Binomial Probability"},
                {"href": "../genetic_algorithm/index.html", "innerHTML": "Genetic Algorithm"},
                {"href": "../newton_rhapson/index.html", "innerHTML": "Newton-Rhapson"},
                {"href": "../rl_qlearning/index.html", "innerHTML": "RL - QLearning"}
            ]}
        ];
        const dropdown = new Dropdown(entries);
    </script>
    <script src="../../static/js/table.js"></script>
    <script src="static/js/table.js"></script>
    <script src="static/js/utils.js"></script>
    <div class="d-flex justify-content-center mt-4">
        <button id="btn_add" class="btn btn-dark mx-2" style="width: 150px;">Add Node</button>
        <button id="btn_remove" class="btn btn-dark mx-2" style="width: 150px;">Remove Node</button>
    </div>
    
    <div class="container justify-content-center w-100">
        <div id="xy" style="height: 400px" class="w-100"></div>
    </div>
    <div class="d-flex justify-content-center">
        <button id="btn_calculate" class="btn btn-dark mx-2" style="width: 150px">Calculate</button>
    </div>
    <div class="container justify-content-center w-100">
        <div id="result" class="w-100 text-center"></div>
    </div>    
    <script>
        const xy_table = new Table(["Evidence", "Dependancy", "Probability P(E)"], document.getElementById("xy"), 0);
        xy_table.table.removeChild(xy_table.table.children[1]);
        xy_table.table.className = "table table-sm mt-4";
        xy_table.table.style.marginTop = "0px";
        document.getElementById("xy").style.overflowY = "auto";
        
        const result_table = new Table(["Posterior Probability", "Value (%)"], document.getElementById("result"), 0);
        result_table.table.removeChild(result_table.table.children[1]);
        result_table.table.className = "table table-sm mt-4 text-center justify-content-center";
        result_table.table.style.marginTop = "0px";
        document.getElementById("result").style.overflowY = "auto";
        for (var child of result_table.table.children) {
            for (var i = 0; i < 2; i++) { 
                child.children[i].className += " w-50"; 
            }
        }
    </script>
    
    <script src="static/js/index.js"></script>
